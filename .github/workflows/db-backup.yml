name: Daily DB Backup

on:
  schedule:
    # Runs every day at 02:00 UTC (07:30 IST)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg curl lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PGPASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          pg_dump --version
          FILENAME="backup_$(date +'%Y-%m-%d_%H-%M-%S').sql"
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="$FILENAME"
          gzip "$FILENAME"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_id }}
          path: "*.sql.gz"
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Backup Complete" >> $GITHUB_STEP_SUMMARY
          echo "File: \`$BACKUP_FILE\`" >> $GITHUB_STEP_SUMMARY
          echo "Size: $(du -sh *.sql.gz | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "Retained for: 90 days" >> $GITHUB_STEP_SUMMARY
