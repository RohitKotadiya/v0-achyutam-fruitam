<svg width="512" height="512" viewBox="0 0 600 600" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AFM Logo</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fruitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <clipPath id="sq">
      <rect x="50" y="50" width="500" height="500" rx="110"/>
    </clipPath>
  </defs>

  <!-- BACKGROUND -->
  <rect x="50" y="50" width="500" height="500" rx="110" fill="url(#bg)"/>
  <rect x="50" y="50" width="500" height="500" rx="110" fill="url(#sheen)"/>

  <!-- blobs -->
  <ellipse cx="160" cy="160" rx="220" ry="180" fill="#a78bfa" opacity="0.09" clip-path="url(#sq)"/>
  <ellipse cx="460" cy="470" rx="180" ry="160" fill="#3b0764" opacity="0.22" clip-path="url(#sq)"/>

  <!-- CITRUS SLICE — top right -->
  <g clip-path="url(#sq)">
    <circle cx="494" cy="108" r="90" fill="#f97316" opacity="0.9"/>
    <circle cx="494" cy="108" r="78" fill="url(#fruitGrad)"/>
    <line x1="494" y1="30"  x2="494" y2="186" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="416" y1="108" x2="572" y2="108" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="438" y1="53"  x2="550" y2="163" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="550" y1="53"  x2="438" y2="163" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <circle cx="494" cy="108" r="24" fill="#fef9c3" opacity="0.65"/>
    <circle cx="494" cy="108" r="10" fill="#f59e0b"/>
    <path d="M434 66 Q452 44 478 50" stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.22"/>
    <path d="M480 26 Q466 4  476 -8  Q490 6  480 26Z" fill="#22c55e"/>
    <path d="M496 22 Q492 -2 508 -10 Q514 10 496 22Z" fill="#16a34a"/>
  </g>

  <!-- GRAPE DOTS — bottom left -->
  <g clip-path="url(#sq)" opacity="0.78">
    <circle cx="100" cy="498" r="22" fill="#8b5cf6"/>
    <circle cx="124" cy="486" r="22" fill="#6d28d9"/>
    <circle cx="112" cy="464" r="20" fill="#7c3aed"/>
    <circle cx="136" cy="472" r="18" fill="#a78bfa"/>
    <circle cx="95"  cy="492" r="5"  fill="#ede9fe" opacity="0.45"/>
    <circle cx="119" cy="480" r="5"  fill="#ede9fe" opacity="0.45"/>
  </g>

  <!-- AFM -->
  <text
    x="300" y="300"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',system-ui,sans-serif"
    font-size="200" font-weight="900"
    letter-spacing="-10"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    paint-order="stroke"
    stroke="#3b0764"
    stroke-width="1"
    stroke-linejoin="round">AFM</text>

  <!-- rule -->
  <rect x="110" y="432" width="380" height="1.5" rx="1" fill="#a78bfa" opacity="0.3"/>

  <!-- line 1 — faded -->
  <text x="300" y="462"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="13" font-weight="600"
    letter-spacing="3"
    fill="#c4b5fd"
    opacity="0.6"
    text-anchor="middle">CHILL THE ICE CREAM.</text>

  <!-- line 2 — brighter -->
  <text x="300" y="492"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="13" font-weight="600"
    letter-spacing="3"
    fill="#c4b5fd"
    opacity="0.9"
    text-anchor="middle">NOT THE BUSINESS.</text>

</svg>
